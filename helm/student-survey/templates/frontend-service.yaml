apiVersion: v1
kind: Service
metadata:
  name: student-survey-frontend-service
spec:
  type: NodePort
  selector:
    app: student-survey-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: {{ .Values.frontend.service.nodePort }}
